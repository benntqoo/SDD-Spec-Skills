name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GO_MODULE: github.com/vic-sdd/vic
  BINARY_NAME: vic
  BUILD_DIR: dist

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_major=${VERSION#v}" | cut -d. -f1 >> $GITHUB_OUTPUT

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}

      - name: Build Linux amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-linux-amd64 \
            ./cmd/vic-go

      - name: Build Linux arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-linux-arm64 \
            ./cmd/vic-go

      - name: Build macOS amd64
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-darwin-amd64 \
            ./cmd/vic-go

      - name: Build macOS arm64
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-darwin-arm64 \
            ./cmd/vic-go

      - name: Build Windows amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-windows-amd64.exe \
            ./cmd/vic-go

      - name: Build Windows arm64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-windows-arm64.exe \
            ./cmd/vic-go

      - name: Generate checksums
        run: |
          cd ${{ env.BUILD_DIR }}
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag for comparison
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Build changelog from conventional commits
          {
            echo "## What's Changed"
            echo ""
            
            # Features
            FEATS=$(git log --oneline ${PREV_TAG}..HEAD --grep="^feat" --grep="^feat(" 2>/dev/null | sed 's/^/✦ /' || true)
            if [[ -n "$FEATS" ]]; then
              echo "### ✨ Features"
              echo "$FEATS"
              echo ""
            fi
            
            # Bug fixes
            FIXES=$(git log --oneline ${PREV_TAG}..HEAD --grep="^fix" --grep="^fix(" 2>/dev/null | sed 's/^/🐛 /' || true)
            if [[ -n "$FIXES" ]]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            
            # Documentation
            DOCS=$(git log --oneline ${PREV_TAG}..HEAD --grep="^docs" 2>/dev/null | sed 's/^/📝 /' || true)
            if [[ -n "$DOCS" ]]; then
              echo "### 📝 Documentation"
              echo "$DOCS"
              echo ""
            fi
            
            # Refactoring
            REFS=$(git log --oneline ${PREV_TAG}..HEAD --grep="^refactor" 2>/dev/null | sed 's/^/♻️ /' || true)
            if [[ -n "$REFS" ]]; then
              echo "### ♻️ Refactoring"
              echo "$REFS"
              echo ""
            fi
            
            # Performance
            PERF=$(git log --oneline ${PREV_TAG}..HEAD --grep="^perf" 2>/dev/null | sed 's/^/⚡ /' || true)
            if [[ -n "$PERF" ]]; then
              echo "### ⚡ Performance"
              echo "$PERF"
              echo ""
            fi
            
            # Other changes
            OTHER=$(git log --oneline ${PREV_TAG}..HEAD --grep="^chore\|^test\|^build\|^ci" 2>/dev/null | sed 's/^/📦 /' || true)
            if [[ -n "$OTHER" ]]; then
              echo "### 📦 Other Changes"
              echo "$OTHER"
              echo ""
            fi
            
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.version }}"
          } > changelog.md
          
          cat changelog.md
          echo "changelog_file=changelog.md" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: ${{ env.BUILD_DIR }}/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.changelog_file }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
          generate_release_notes: false
          files: |
            ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-linux-amd64
            ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-linux-arm64
            ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-darwin-amd64
            ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-darwin-arm64
            ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-windows-amd64.exe
            ${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}-windows-arm64.exe
            ${{ env.BUILD_DIR }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
