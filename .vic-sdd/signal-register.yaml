# Signal Register - 进展的证据链
# ============================================================
# 用"证据"代替"百分比"来衡量进展
# 
# 核心原则：
# - 不是"进度 60%"，而是"4 个测试通过、1 个功能实现"
# - 每个有意义的行动产生一个信号
# - 信号必须具体，不能模糊
# ============================================================

# 当前任务
current_task:
  id: ""
  name: ""
  started: ""
  goal: ""

# 信号累积
signals:
  
  # 正面信号（证明在正确方向）
  positive: []
  
  # 警告信号（需要关注，但还没阻塞）
  warnings: []
  
  # 阻塞信号（必须解决才能继续）
  blockers: []

# 信心度计算
# ============================================================
# 公式：confidence = (positive - warnings×0.3 - blockers×0.5) / max_signals
# 
# 解读：
# - 高 (> 0.7): 可以继续推进
# - 中 (0.4-0.7): 可以继续但要关注警告
# - 低 (< 0.4): 暂停，先解决警告和阻塞
# ============================================================
confidence:
  positive: 0
  warnings: 0
  blockers: 0
  calculated: 0.0
  status: unknown  # high / moderate / low / unknown

# ============================================================
# 信号类型参考
# ============================================================
#
# positive 信号类型:
# - code_created: 创建了文件/代码
# - test_created: 创建了测试
# - test_passed: 测试通过
# - refactoring_done: 重构完成
# - bug_fixed: 修复了 bug
# - spec_aligned: 与 SPEC 对齐
# - deps_added: 添加了依赖
# - docs_updated: 更新了文档
#
# warning 信号类型:
# - assumption_made: 使用了未验证的假设
# - edge_case_found: 发现边界情况
# - complexity_increased: 复杂度上升
# - deps_added: 添加了新依赖
# - confidence_dropped: 信心度下降
#
# blocker 信号类型:
# - unknown_blocking: 有未知问题阻塞
# - dependency_blocking: 依赖未解决
# - decision_blocking: 需要决策才能继续
# - spec_unclear: SPEC 不清晰
# - env_blocking: 环境问题阻塞
#
# ============================================================
# 信心度阈值
# ============================================================
#
# 如果 blockers >= 2：
#   → 停止，更新状态，等待人类
#
# 如果 confidence < 0.4：
#   → 暂停，优先解决警告
#
# 如果 confidence >= 0.7 AND blockers == 0：
#   → 状态良好，继续推进
