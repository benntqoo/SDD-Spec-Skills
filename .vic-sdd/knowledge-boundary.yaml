# Knowledge Boundary - AI 的认知地图
# ============================================================
# 这个文件是 AI 的"镜子"
# AI 在决策前必须查询这个文件
# 
# 分类原则：
# - known: 验证过的事实（最高可信度）
# - inferred: 从模式推断的（需要验证）
# - assumed: 假设的（高风险）
# - unknown: 完全不知道的（可能阻塞）
# ============================================================

# 我验证过的事实
# source: 文件路径或命令
# verified: 验证日期
# by: 验证方法
known: []

# 我从模式推断的
# confidence: 0-1，越低越需要验证
# needs_verification: true/false
inferred: []

# 我假设的
# risk: high/medium/low
# verification_needed: 需要做什么来验证
assumed: []

# 我不知道的
# blocks: 阻塞的任务 ID 列表
# priority: high/medium/low
# resolution_path: 如何解决
unknown: []

# ============================================================
# 更新原则
# ============================================================
# 
# 1. 如果验证了新事实：
#    → 添加到 known，包含 source、verified、by
#
# 2. 如果做出了推断：
#    → 添加到 inferred，标记 confidence 和 needs_verification
#
# 3. 如果发现了不知道的：
#    → 添加到 unknown，标记 blocks 和 priority
#
# 4. 定期检查：
#    → inferred 中 needs_verification=true 超过 5 个 → 先验证
#    → assumed 中 risk=high → 必须验证才能继续
#    → unknown 中 blocks 高优先级任务 → 暂停
