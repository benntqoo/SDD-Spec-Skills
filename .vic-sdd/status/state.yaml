        - id: AUTH-002
          title: 添加 Refresh Token 机制
          decision: |
            添加 refresh token
            - Access token: 1 小时有效期
            - Refresh token: 7 天有效期
            - 定期刷新，保持登录状态
          category: authentication
          reason: 平衡安全性和用户体验
