# Decision Guardrails - AI 的刹车片
# ============================================================
# AI 在决策前必须检查的约束
# 
# 这个文件定义了什么可以做、什么不能做、什么时候必须停止
# ============================================================

# 范围约束
scope:
  # 用户原始请求
  core_request: ""
  
  # 已批准的功能（可以在这些范围内自由工作）
  approved: []
  
  # 禁止的功能（绝对不能做）
  forbidden: []
  
  # 允许的最大范围扩展比例（0.0-1.0）
  # 例如 0.2 表示最多允许 20% 的合理扩展
  max_expansion: 0.2

# 尝试约束
attempts:
  # 单个任务允许的最大尝试次数
  max_on_task: 5
  
  # 超过这个次数后标记警告
  escalation_after: 3

# 质量红线（违反任何一条都是不允许的）
quality:
  hard_lines:
    # 代码里不能有 TODO/FIXME
    no_todo_in_code: true
    
    # 生产代码不能有 console.log
    no_console_in_prod: true
    
    # 不能有硬编码密钥
    no_hardcoded_secrets: true
    
    # 新功能必须有测试
    tests_required: true
    
    # 必须与 SPEC 对齐
    spec_aligned: true

# 信号约束
signals:
  # 至少需要多少个正面信号才能算"有进展"
  min_positive_for_progress: 3
  
  # 超过多少个阻塞就暂停
  max_blockers: 2
  
  # 信心度低于多少就暂停
  min_confidence: 0.5

# ============================================================
# 决策检查流程
# ============================================================
#
# 在做出以下决策前，必须检查：
# 1. 范围检查 → 在 approved？Forbidden？需要扩展？
# 2. 尝试检查 → 超过最大次数？
# 3. 质量检查 → 违反红线？
# 4. 信号检查 → 阻塞太多？信心度太低？
#
# 检查结果：
# ✅ → 继续
# ⚠️ → 警告，可以继续但要关注
# ❌ → 停止，等待人类
