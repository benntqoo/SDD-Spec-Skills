      - findByEmail(email): Promise<User | null>
      - create(data): Promise<User>
      - update(id, data): Promise<User>

  # JWT Service
  # -----------
  jwt-service:
    type: service
    description: "JWT token generation and verification"
    files:
      - src/services/jwt.service.ts
    depends_on: []
