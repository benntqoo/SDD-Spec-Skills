    important_notes: "前端状态管理"


# Modules
# =======
modules:
  # Backend Services
  - name: auth-service
    type: service
    path: src/auth/
    description: "用户认证服务"
    exports:
      - "login"
      - "register"
      - "logout"
      - "verifyToken"
    key_files:
      - "src/auth/login.ts"
      - "src/auth/register.ts"

  - name: user-service
    type: service
    path: src/services/user.service.ts
    description: "用户业务逻辑"
    exports:
      - "getProfile"
      - "updateProfile"
      - "getUserSettings"

  - name: order-service
    type: service
    path: src/services/order.service.ts
    description: "订单业务逻辑"
    exports:
      - "createOrder"
      - "getOrder"
      - "cancelOrder"

  - name: jwt-service
    type: service
    path: src/services/jwt.service.ts
    description: "JWT token 服务"
    exports:
      - "sign"
      - "verify"

  # Repositories
  - name: user-repository
    type: repository
    path: src/repositories/user.repository.ts
    description: "用户数据访问"
    exports:
      - "findById"
      - "findByEmail"
      - "create"

  - name: order-repository
    type: repository
    path: src/repositories/order.repository.ts
    description: "订单数据访问"
    exports:
      - "create"
      - "findById"
      - "findByUserId"

  # Controllers
  - name: auth-controller
    type: controller
    path: src/routes/auth.ts
    description: "认证 API 路由"
    exports:
      - "POST /auth/login"
      - "POST /auth/register"
      - "POST /auth/logout"

  - name: user-controller
    type: controller
    path: src/routes/users.ts
    description: "用户 API 路由"
    exports:
      - "GET /users/me"
      - "PUT /users/me"

  - name: order-controller
    type: controller
    path: src/routes/orders.ts
    description: "订单 API 路由"
    exports:
      - "POST /orders"
      - "GET /orders/:id"
      - "DELETE /orders/:id"

  # Middleware
  - name: auth-middleware
    type: middleware
    path: src/middleware/auth.ts
    description: "认证中间件"
    exports:
      - "authenticate"

  # Frontend
  - name: auth-store
    type: component
    path: src/stores/auth.ts
    description: "Pinia auth store"
    exports:
      - "user"
      - "login"
      - "logout"

  - name: LoginPage
    type: component
    path: src/views/Login.vue
    description: "登录页面"


# Entry Points
# ============
entry_points:
  - type: backend
    path: src/app.ts
    description: "Express 应用入口"

  - type: backend
    path: src/server.ts
    description: "HTTP 服务器入口"

  - type: frontend
    path: src/main.ts
    description: "Vue 应用入口"

  - type: frontend
    path: index.html
    description: "前端页面入口"

  - type: cli
    path: prisma/schema.prisma
    description: "Prisma schema 定义"


# Quick Reference
# ===============
# Looking for...
#   - API routes? → src/routes/
#   - Business logic? → src/services/
#   - Database? → prisma/schema.prisma
#   - Frontend? → src/views/, src/components/
#   - Auth? → src/auth/, src/middleware/auth.ts
#   - Config? → .env, config/
