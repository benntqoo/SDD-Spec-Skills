# Project Metadata - Vibe Integrity
# ================================
# This file provides AI with quick project understanding
# AI should read this first when starting work on the project

name: my-saas-app
version: 0.2.0
status: beta
description: "B2B SaaS 平台 - 客户管理 + 订单处理"

created_at: 2026-01-15
last_updated: 2026-03-12

tech_stack:
  frontend:
    - name: Vue
      version: "3.4"
    - name: Vite
      version: "5.0"
    - name: Pinia
      version: "2.1"

  backend:
    - name: Express
      version: "4.18"
    - name: Node
      version: "20"
    - name: TypeScript
      version: "5.3"

  database:
    - name: SQLite
      version: "3"
      type: relational
      note: "计划迁移到 PostgreSQL (见 tech-records/database/)"
    - name: Prisma
      version: "5.10"

  infrastructure:
    - name: Docker
      version: "24"
    - name: Nginx
      version: "1.25"

language: TypeScript
package_manager: pnpm

repository:
  type: git
  url: https://github.com/example/my-saas-app
  branch: main

environments:
  development:
    url: http://localhost:3000
    database: sqlite ./dev.db
    variables:
      - NODE_ENV=development
      - DEBUG=true

  staging:
    url: https://staging.example.com
    database: postgresql://staging-db
    variables:
      - NODE_ENV=staging

  production:
    url: https://example.com
    database: postgresql://prod-db
    variables:
      - NODE_ENV=production

key_features:
  - 用户认证 (JWT)
  - 客户管理 (CRUD)
  - 订单处理
  - 仪表板统计

owner:
  name: Development Team
  contact: dev@example.com

notes: |
  # Important Notes for AI

  ## Current Development Focus
  - Beta 阶段，重点是稳定性
  - 计划 Q2 迁移到 PostgreSQL

  ## Known Issues
  - 并发处理较弱 (SQLite 限制)
  - 某些 API 缺少错误处理

  ## Architecture Notes
  - 使用 Repository 模式
  - 中间件处理认证
  - 前端使用 Composition API
